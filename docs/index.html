<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SarapSeoul | Order</title>

<!-- GA4 -->

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link rel="stylesheet" href="./css/styles.css"/>

<meta property="og:type" content="website"/>
<meta property="og:title" content="SarapSeoul | Filipino-Korean Pop-Up"/>
<meta property="og:description" content="Order Filipino-Korean comfort food in the DMV. Pickup & delivery available."/>
<meta property="og:image" content="https://sarapseoul.github.io/Order-Here/img/sarapseoul-logo.jpg"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
</head>

<body class="min-h-screen">

<header class="ss-navbar reveal-on-load">
  <div class="ss-navbar__inner">
    <div class="ss-navmenu-wrap">
      <button
        type="button"
        id="navMenuToggle"
        class="ss-navmenu-toggle"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="navDropdownMenu">
        <img
          id="navMenuToggleImg"
          class="ss-navmenu-toggle__img"
          src="img/menu-button.png"
          data-default-src="img/menu-button.png"
          data-active-src="img/menu-button.png"
          alt="Menu"/>
      </button>

      <div id="navDropdownMenu" class="ss-dropdown hidden">
        <button type="button" class="ss-dropdown__link" id="navHomeBtn">Home</button>
        <button type="button" class="ss-dropdown__link" id="navMenuBtn">Menu</button>
        <button type="button" class="ss-dropdown__link" id="navCartBtn">Cart</button>
      </div>
    </div>
  </div>
</header>

<section id="home" class="hero-landing">
  <picture class="hero-landing__media">
    <source media="(max-width:768px)" srcset="img/landing-mobile.png"/>
    <img src="img/landing-desktop.png" class="hero-landing__bg" alt=""/>
  </picture>

  <div class="ss-hero-content px-4">
    <div class="ss-hero-stack reveal-on-load">
  

        <button
          type="button"
          id="heroOrderNowBtn"
          class="ss-hero-cta"
          aria-label="View menu">
          <img
            id="heroOrderNowImg"
            class="ss-hero-cta__img"
            src="img/Order-now-initial.png"
            data-default-src="img/Order-now-initial.png"
            data-active-src="img/Order-now-clicked.png"
            alt="Order Now"/>
        </button>
      
    </div>
  </div>
</section>

<main class="max-w-5xl mx-auto px-4 pb-14">
  <section id="menuPage" class="reveal-on-scroll">
    <div id="scheduleBanner"
      class="max-w-3xl mx-auto mt-8 mb-6 rounded-2xl border-4 rust-border bg-white/70 shadow-lg p-4 md:p-5 paper-texture text-center">
      <p id="scheduleLine1" class="handwritten text-xl md:text-2xl deep-blue font-bold leading-snug">Loading schedule…</p>
      <p id="scheduleLine2" class="handwritten text-lg md:text-xl text-gray-700 font-bold mt-2 leading-snug">Please wait…</p>
    </div>

    <div class="flex flex-wrap gap-3 items-center justify-center mt-4 mb-8">
      <button data-cat="featured" class="ss-cat-btn menu-title text-xl md:text-2xl deep-blue font-bold px-5 py-3 bg-white/70 rust-border border-4 rounded-2xl shadow-md">⭐Featured⭐</button>
      <button data-cat="menu" class="ss-cat-btn menu-title text-xl md:text-2xl deep-blue font-bold px-5 py-3 bg-white/40 rust-border border-4 rounded-2xl shadow-md">Mains</button>
      <button data-cat="desserts" class="ss-cat-btn menu-title text-xl md:text-2xl deep-blue font-bold px-5 py-3 bg-white/40 rust-border border-4 rounded-2xl shadow-md">Desserts</button>
      <button data-cat="party" class="ss-cat-btn menu-title text-xl md:text-2xl deep-blue font-bold px-5 py-3 bg-white/40 rust-border border-4 rounded-2xl shadow-md">Party Trays</button>
    </div>

    <section class="mb-12" id="menu-select">
      <h2 class="menu-title text-5xl text-center deep-blue font-bold mb-8" id="menu-heading">Featured</h2>
      <div id="menu-list" class="space-y-4"></div>
    </section>
  </section>

  <section id="checkoutPage" class="hidden reveal-on-scroll">
    <div class="flex justify-center mb-6">
      <button
        id="backToMenuBtn"
        type="button"
        class="bg-white/70 rust-border border-4 rounded-2xl shadow-md px-6 py-3 handwritten text-xl deep-blue font-bold hover:opacity-90 transition-opacity flex items-center gap-2">
        <i data-lucide="arrow-left" class="w-6 h-6"></i>
        Back to Menu
      </button>
    </div>

    <section id="order-section" class="bg-white rounded-2xl shadow-2xl p-6 md:p-10 rust-border border-4 relative overflow-hidden paper-texture">
      <h3 class="handwritten text-4xl md:text-5xl deep-blue font-bold text-center mb-8">Place Your Order</h3>

      <form id="orderForm" class="space-y-6">
        <div>
          <label class="block handwritten text-xl text-gray-700 mb-2 font-semibold">Name *</label>
          <input
            id="customerName"
            required
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-300 focus:border-[#B83C1D] focus:outline-none bg-white/80 text-lg"
            placeholder="Your name"/>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block handwritten text-xl text-gray-700 mb-2 font-semibold">Preferred Contact *</label>
            <select id="contactMethod" class="w-full px-4 py-3 rounded-lg border-2 border-gray-300 focus:border-[#B83C1D] focus:outline-none bg-white/80 text-lg">
              <option value="instagram">Instagram DM</option>
              <option value="phone">Phone</option>
            </select>
          </div>

          <div>
            <label class="block handwritten text-xl text-gray-700 mb-2 font-semibold">
              Instagram <span id="igRequiredStar">*</span>
            </label>
            <input
              id="instagram"
              class="w-full px-4 py-3 rounded-lg border-2 border-gray-300 focus:border-[#B83C1D] focus:outline-none bg-white/80 text-lg"
              placeholder="@username"/>
          </div>

          <div>
            <label class="block handwritten text-xl text-gray-700 mb-2 font-semibold">
              Phone <span id="phoneRequiredStar" class="hidden">*</span>
            </label>
            <input
              id="phone"
              class="w-full px-4 py-3 rounded-lg border-2 border-gray-300 focus:border-[#B83C1D] focus:outline-none bg-white/80 text-lg"
              placeholder="(555) 555-5555"/>
          </div>

          <div>
            <label class="block handwritten text-xl text-gray-700 mb-2 font-semibold">Payment Method *</label>
            <select id="paymentMethod" class="w-full px-4 py-3 rounded-lg border-2 border-gray-300 focus:border-[#B83C1D] focus:outline-none bg-white/80 text-lg">
              <option value="">Select payment method</option>
              <option value="zelle">Zelle</option>
              <option value="cashapp">Cash App</option>
              <option value="venmo">Venmo</option>
            </select>
          </div>

          <div>
            <label class="block handwritten text-xl text-gray-700 mb-2 font-semibold">Fulfillment *</label>
            <select id="fulfillment" class="w-full px-4 py-3 rounded-lg border-2 border-gray-300 focus:border-[#B83C1D] focus:outline-none bg-white/80 text-lg">
              <option value="pickup">Pickup</option>
              <option value="delivery">Delivery</option>
            </select>
          </div>

          <div id="addressWrap" class="hidden md:col-span-2">
            <label class="block handwritten text-xl text-gray-700 mb-2 font-semibold">Delivery Address *</label>
            <input
              id="address"
              class="w-full px-4 py-3 rounded-lg border-2 border-gray-300 focus:border-[#B83C1D] focus:outline-none bg-white/80 text-lg"
              placeholder="Street address"/>
          </div>
        </div>

        <p id="deliveryFeeNotice" class="hidden text-gray-600 handwritten text-lg">Delivery fee is TBD based on distance.</p>

        <div>
          <label class="block handwritten text-xl text-gray-700 mb-2 font-semibold">Allergies / Notes</label>
          <textarea
            id="allergies"
            rows="3"
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-300 focus:border-[#B83C1D] focus:outline-none bg-white/80 text-lg"
            placeholder="Allergies, spice level, pickup notes, etc."></textarea>
        </div>

        <div class="bg-[#f5f3f0] rounded-lg p-6 border-2 border-gray-200">
          <h4 class="handwritten text-2xl deep-blue font-bold mb-4">Order Summary</h4>
          <div id="orderSummary" class="space-y-2 text-lg">
            <p class="text-gray-500 italic">No items selected yet. Add items above.</p>
          </div>

          <div class="mt-4 pt-4 border-t-2 border-gray-300 flex justify-between items-center">
            <span class="handwritten text-2xl font-bold text-gray-700">Subtotal:</span>
            <span id="totalPrice" class="handwritten text-3xl font-bold rust-text">$0.00</span>
          </div>
        </div>

        <button
          id="submitBtn"
          type="submit"
          class="order-btn w-full py-4 rounded-xl text-white font-bold text-xl handwritten tracking-wide shadow-lg flex items-center justify-center gap-2">
          <i data-lucide="send" class="w-6 h-6"></i>
          Send Order
        </button>
      </form>

      <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/75 backdrop-blur-sm flex items-center justify-center z-20">
        <div class="loading-spinner"></div>
      </div>

      <div id="successMessage" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm flex items-center justify-center z-20 p-6">
        <div class="max-w-lg text-center bg-white rounded-2xl shadow-xl rust-border border-4 p-6">
          <h4 class="handwritten text-3xl deep-blue font-bold mb-3">Order Sent!</h4>
          <p class="text-gray-700 text-lg">Your order details were copied and sent. We’ll continue with you via <span id="successContactMethod">Instagram</span>.</p>
        </div>
      </div>
    </section>
  </section>


</main>
<footer class="reveal-on-scroll relative w-full py-5">
   <div class="flex justify-center">
  <img src="img/banana-leaves.png" alt="Footer banner" class="block w-60"/>
  </div>
  <div class="absolute inset-0 flex flex-col items-center justify-center gap-1 -translate-y-4">
    <a id="igLink" href="#" class="rust-text hover:opacity-75" target="_blank" rel="noopener noreferrer">
      <i data-lucide="instagram" class="w-8 h-8"></i>
    </a>
<p class="handwritten text-2xl text-[#faead4]">Follow us</p>
<p class="handwritten text-2xl text-[#faead4] -mt-2">@the_sarapseoul</p>
  </div>
</footer>

<button
  id="floatingCheckoutBtn"
  type="button"
  class="hidden fixed right-4 bottom-4 z-[55] rust-bg text-white px-5 py-3 rounded-2xl shadow-2xl handwritten text-xl font-bold hover:opacity-90 flex items-center gap-2">
  <i data-lucide="shopping-bag" class="w-6 h-6"></i>
  <span id="floatingCheckoutLabel">Checkout</span>
</button>

<script src="./js/config.js"></script>
<script src="./js/catalog.js"></script>
<script src="./js/state.js"></script>
<script src="./js/ui-tabs.js"></script>
<script src="./js/ui-menu.js"></script>
<script src="./js/ui-summary.js"></script>
<script src="./js/api-sheets.js"></script>
<script src="./js/form-submit.js"></script>
<script src="./js/main.js"></script>

</body>
</html>
